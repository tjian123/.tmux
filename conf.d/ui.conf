#set -g status-left "#[fg=green]#S "
#set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M"

#setw -g window-status-current-format "#[bg=green,fg=black] #I:#W "
#setw -g window-status-format "#[fg=white] #I:#W "

# 主题风格（推荐 mocha）
set -g @catppuccin_flavour 'mocha'

# 窗口显示名称而不是命令/任务（必须在加载插件前设置）
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# 状态栏位置
set -g status-position bottom

# ========== 优化项 ==========

# 窗口活动监控 (后台任务完成时提示)
set -g monitor-activity on
set -g visual-activity off

# 状态栏刷新间隔 (秒)
set -g status-interval 5

# 窗口自动重命名 (根据运行命令)
set -g automatic-rename on

# 复制模式样式
set -g mode-style 'bg=#45475a,fg=#cdd6f4'

# 样式
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator ""

# 当前窗口高亮
set -g @catppuccin_window_current_background "#{@thm_lavender}"
set -g @catppuccin_window_current_fill "all"

# 显示窗口标记（缩放、忙碌等）
set -g @catppuccin_window_flags "icon"

# 左侧信息
set -g @catppuccin_status_left "session"

# 中间
set -g @catppuccin_status_modules_right "git cpu memory"

# 右侧信息
set -g @catppuccin_status_right "directory date_time"
